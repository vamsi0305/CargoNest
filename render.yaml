# Render Blueprint: https://render.com/docs/blueprint-spec
# After first deploy, set secret env vars in the Render dashboard (Database, Supabase, SESSION_SECRET_KEY, etc.).
services:
  - type: web
    name: cargonest-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c "python -m alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT}"
    healthCheckPath: /api/v1/health
